{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h3 class="mb-4">📊 Dashboard</h3>

<!-- ================= DASHBOARD CARDS ================= -->
<div class="row">
    <div class="col-md-3">
        <div class="dashboard-card blue">
            <h6>Total Students</h6>
            <h2>{{ total_students }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card green">
            <h6>Present</h6>
            <h2>{{ present_count }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card red">
            <h6>Absent</h6>
            <h2>{{ absent_count }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card purple">
            <h6>Avg Marks</h6>
            <h2>{{ avg_marks }}</h2>
        </div>
    </div>
</div>

<!-- ================= CHART SECTION ================= -->
<div class="row mt-5">
    <div class="col-md-6">
        <div class="card p-3">
            <h5 class="text-center mb-3">📅 Attendance Overview</h5>
            <canvas id="attendanceChart"></canvas>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3">
            <h5 class="text-center mb-3">📈 Marks Performance</h5>
            <canvas id="marksChart"></canvas>
        </div>
    </div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <ul id="studentList" class="list-group"></ul>
            </div>
        </div>
    </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const presentCount = {{ present_count }};
    const absentCount  = {{ absent_count }};
    const avgMarks     = {{ avg_marks }};

    /* ---------- MODAL LOADER ---------- */
    function openModal(title, apiUrl, type) {
        document.getElementById("modalTitle").innerText = title;
        const list = document.getElementById("studentList");
        list.innerHTML = "<li class='list-group-item'>Loading...</li>";

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = "";

                if (!data.students || data.students.length === 0) {
                    list.innerHTML = "<li class='list-group-item text-muted'>No data</li>";
                    return;
                }

                data.students.forEach(s => {
                    if (type === "marks") {
                        list.innerHTML += `
                            <li class="list-group-item d-flex justify-content-between">
                                <span>${s.name}</span>
                                <strong>${s.marks}</strong>
                            </li>`;
                    } else {
                        list.innerHTML += `
                            <li class="list-group-item">${s}</li>`;
                    }
                });
            });

        $('#studentModal').modal('show');
    }

    /* ---------- ATTENDANCE PIE CHART ---------- */
    new Chart(document.getElementById('attendanceChart'), {
        type: 'pie',
        data: {
            labels: ['Present', 'Absent'],
            datasets: [{
                data: [presentCount, absentCount],
                backgroundColor: ['#28a745', '#dc3545']
            }]
        },
        options: {
            onClick: function (_, elements) {
                if (elements.length > 0) {
                    const status = this.data.labels[elements[0].index];

                    openModal(
                        status + " Students",
                        `/api/attendance/${status}`,
                        "attendance"
                    );
                }
            }
        }
    });

    /* ---------- MARKS BAR CHART ---------- */
    new Chart(document.getElementById('marksChart'), {
        type: 'bar',
        data: {
            labels: ['Maths', 'Science', 'English'],
            datasets: [{
                label: 'Average Marks',
                data: [avgMarks - 10, avgMarks, avgMarks + 5],
                backgroundColor: ['#007bff', '#6f42c1', '#17a2b8']
            }]
        },
        options: {
            onClick: function (_, elements) {
                if (elements.length > 0) {
                    const subject = this.data.labels[elements[0].index];

                    openModal(
                        subject + " Marks",
                        `/api/marks/${subject}`,
                        "marks"
                    );
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

{% endblock %}
