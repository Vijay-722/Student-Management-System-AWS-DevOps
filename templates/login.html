<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | StudentMS</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    >

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #343a40, #212529);
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .login-header i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 8px;
            height: 45px;
        }

        .input-group-text {
            background: #f1f3f5;
            border-radius: 8px 0 0 8px;
        }

        .btn-login {
            border-radius: 8px;
            height: 45px;
            font-weight: 600;
        }

        .login-footer {
            text-align: center;
            font-size: 13px;
            color: #6c757d;
        }
    </style>
</head>

<body>

<div class="card login-card shadow-lg">

    <!-- HEADER -->
    <div class="login-header">
        <i class="fa fa-user-shield"></i>
        <h4 class="mb-0">Admin Login</h4>
        <small>Student Management System</small>
    </div>

    <!-- BODY -->
    <div class="card-body p-4 bg-white">

        {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">

            <!-- USERNAME -->
            <div class="form-group">
                <label class="small font-weight-bold">Username</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">
                            <i class="fa fa-user"></i>
                        </span>
                    </div>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required
                    >
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label class="small font-weight-bold">Password</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">
                            <i class="fa fa-lock"></i>
                        </span>
                    </div>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required
                    >
                </div>
            </div>

            <!-- LOGIN BUTTON -->
            <button class="btn btn-primary btn-block btn-login mt-4">
                <i class="fa fa-sign-in-alt mr-1"></i> Login
            </button>

        </form>
    </div>

    <!-- FOOTER -->
    <div class="card-footer login-footer bg-light">
        © 2025 StudentMS | Secure Admin Panel
    </div>

</div>

</body>
</html>
